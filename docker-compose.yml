services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: image_factory
      POSTGRES_USER: image_factory
      POSTGRES_PASSWORD: image_factory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U image_factory -d image_factory"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://image_factory:image_factory@postgres:5432/image_factory
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/workspace

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://image_factory:image_factory@postgres:5432/image_factory
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/workspace

volumes:
  postgres_data:
